{% set name = "aiidalab" %}
{% set version = "26.5.0" %}
{% set python_min = "3.9" %}
{% set sha256 = "2685ef2845107107f310779953f11a72668bf717cc27c8b0d613d868c4c1d31e" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aiidalab-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  entry_points:
    - aiidalab = aiidalab.__main__:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - flit-core >=3.4,=3
  run:
    # NOTE: These do not include the optional dependencies from "registry" extras
    - cachetools >=4.1,=4
    - click >=7.0,<9
    - click-spinner >=0.1,=0
    - dulwich >=0.20,=0
    - packaging >=20.1
    - pip
    - python >={{ python_min }}
    - requests >=2.27,=2
    - requests-cache >=1.0,=1
    - setuptools <82
    - tabulate >=0.8,=0
    - toml >=0.10,=0
    - traitlets >=5.0,=5
    - watchdog >=6.0,=6

test:
  imports:
    - aiidalab
  commands:
    - pip check
    - aiidalab --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/aiidalab/aiidalab
  summary: Implements core functions of AiiDAlab.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - yakutovicha
    - danielhollas
    - edan-bainglass
